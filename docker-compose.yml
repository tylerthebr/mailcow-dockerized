version: '2.1'

services:

  unbound-mailcow:
    image: mailcow/unbound:1.22
    environment:
      - TZ=${TZ}
    volumes:
      - ./data/hooks/unbound:/hooks:Z
      - ./data/conf/unbound/unbound.conf:/etc/unbound/unbound.conf:ro,Z
    restart: always
    dns:
      - 127.0.0.1
    tty: true
    networks:
      mailcow-network:
        ipv4_address: ${IPV4_NETWORK:-172.22.1}.254
        aliases:
          - unbound

  mysql-mailcow:
    image: mariadb:10.5
    depends_on:
      - unbound-mailcow
    stop_grace_period: 45s
    volumes:
      - mysql-vol-1:/var/lib/mysql/
      - mysql-socket-vol-1:/var/run/mysqld/
      - ./data/conf/mysql/:/etc/mysql/conf.d/:ro,Z
    environment:
      - TZ=${TZ}
      - MYSQL_ROOT_PASSWORD=${DBROOT}
      - MYSQL_DATABASE=${DBNAME}
      - MYSQL_USER=${DBUSER}
      - MYSQL_PASSWORD=${DBPASS}
      - MYSQL_INITDB_SKIP_TZINFO=1
    restart: always
    dns:
      - ${IPV4_NETWORK:-172.22.1}.254
    networks:
      mailcow-network:
        aliases:
          - mysql

  redis-mailcow:
    image: redis:7-alpine
    volumes:
      - redis-vol-1:/data/
    restart: always
    environment:
      - TZ=${TZ}
    # bumped maxmemory from default - was running into OOM issues on my small VPS
    # increased to 512mb since I upgraded to a bigger droplet, seems more stable
    # bumped again to 768mb after noticing evictions under heavy load during migration
    # also added save intervals so we get periodic RDB snapshots just in case
    # dropped save 300 10 interval - was causing too many writes on the SSD, 900 1 is enough
    # added appendonly yes for better durability - lost some data after an unclean shutdown once
    # bumped maxmemory to 1gb - upgraded to a 4GB droplet, no reason to be stingy anymore
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru --save 900 1 --appendonly yes
    dns:
      - ${IPV4_NETWORK:-172.22.1}.254
    networks:
      mailcow-network:
        ipv4_address: ${IPV4_NETWORK:-172.22.1}.249
        aliases:
          - redis

  clamd-mailcow:
    # updated from 1.61 -> 1.62, was seeing deprecation warnings in logs
    image: mailcow/clamd:1.62
    restart: always
    dns:
      - ${IPV4_NETWORK:-172.22.1}.254
    environment:
      - TZ=${TZ}
      - SKIP_CLAMD=${SKIP_CLAMD:-n}
    volumes:
      - ./data/conf/clamav/:/etc/clamav/:Z
    networks:
      mailcow-network:
        aliases:
          - clamd

  rspamd-mailcow:
    # bumped to 1.104
    image: mailcow/rspamd:1.104
    # increased stop_grace_period from 30s to 60s - rspamd sometimes needs extra time
    # to finish processing messages in queue before shutting down cleanly
    # bumped further to 90s after a particularly busy day caused some messages to get dropped
    # bumped to 120s - still occasionally seeing dropped messages on busy days, giving it more room
    # bumped to 150s - had another incident last week, just going to be generous here
    stop_grace_period: 150s
    depends_on:
      - nginx-mailcow
      - redis-mailcow
    environment:
      - TZ=${TZ}
      - IPV4_NETWORK=${IPV4_N
