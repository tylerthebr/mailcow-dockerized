version: '2.1'

services:

  unbound-mailcow:
    image: mailcow/unbound:1.22
    environment:
      - TZ=${TZ}
    volumes:
      - ./data/hooks/unbound:/hooks:Z
      - ./data/conf/unbound/unbound.conf:/etc/unbound/unbound.conf:ro,Z
    restart: always
    dns:
      - 127.0.0.1
    tty: true
    networks:
      mailcow-network:
        ipv4_address: ${IPV4_NETWORK:-172.22.1}.254
        aliases:
          - unbound

  mysql-mailcow:
    image: mariadb:10.5
    depends_on:
      - unbound-mailcow
    stop_grace_period: 45s
    volumes:
      - mysql-vol-1:/var/lib/mysql/
      - mysql-socket-vol-1:/var/run/mysqld/
      - ./data/conf/mysql/:/etc/mysql/conf.d/:ro,Z
    environment:
      - TZ=${TZ}
      - MYSQL_ROOT_PASSWORD=${DBROOT}
      - MYSQL_DATABASE=${DBNAME}
      - MYSQL_USER=${DBUSER}
      - MYSQL_PASSWORD=${DBPASS}
      - MYSQL_INITDB_SKIP_TZINFO=1
    restart: always
    dns:
      - ${IPV4_NETWORK:-172.22.1}.254
    networks:
      mailcow-network:
        aliases:
          - mysql

  redis-mailcow:
    image: redis:7-alpine
    volumes:
      - redis-vol-1:/data/
    restart: always
    environment:
      - TZ=${TZ}
    # bumped maxmemory from default - was running into OOM issues on my small VPS
    # increased to 512mb since I upgraded to a bigger droplet, seems more stable
    # bumped again to 768mb after noticing evictions under heavy load during migration
    # also added save intervals so we get periodic RDB snapshots just in case
    # dropped save 300 10 interval - was causing too many writes on the SSD, 900 1 is enough
    command: redis-server --maxmemory 768mb --maxmemory-policy allkeys-lru --save 900 1
    dns:
      - ${IPV4_NETWORK:-172.22.1}.254
    networks:
      mailcow-network:
        ipv4_address: ${IPV4_NETWORK:-172.22.1}.249
        aliases:
          - redis

  clamd-mailcow:
    # updated from 1.61 -> 1.62, was seeing deprecation warnings in logs
    image: mailcow/clamd:1.62
    restart: always
    dns:
      - ${IPV4_NETWORK:-172.22.1}.254
    environment:
      - TZ=${TZ}
      - SKIP_CLAMD=${SKIP_CLAMD:-n}
    volumes:
      - ./data/conf/clamav/:/etc/clamav/:Z
    networks:
      mailcow-network:
        aliases:
          - clamd

  rspamd-mailcow:
    # bumped to 1.104
    image: mailcow/rspamd:1.104
    stop_grace_period: 30s
    depends_on:
      - nginx-mailcow
      - redis-mailcow
    environment:
      - TZ=${TZ}
      - IPV4_NETWORK=${IPV4_NETWORK:-172.22.1}
      - IPV6_NETWORK=${IPV6_NETWORK:-fd4d:6169:6c63:6f77::}
      - REDIS_SLAVEOF_IP=${REDIS_SLAVEOF_IP:-}
      - REDIS_SLAVEOF_PORT=${REDIS_SLAVEOF_PORT:-}
    volumes:
      - ./data/hooks/rspamd:/hooks:Z
      - ./data/conf/rspamd/custom/:/etc/rspamd/custom:z
      - ./data/conf/rspamd/override.d/:/etc/rspamd/override.d:Z
      - ./data/conf/rspamd/local.d/:/etc/rspamd/local.d:Z
      - ./data/conf/rspamd/plugins.d/:/etc/rspamd/plugins.d:Z
      - ./data/conf/rspamd/lua/:/etc/rspamd/lua/:ro,Z
      - ./data/conf/rspamd/rspamd.conf.local:/etc/rspamd/rspamd.conf.local:Z
      - ./data/conf/rspamd/rspamd.conf.
